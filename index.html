<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cash-Flow | Salary & Expense Tracker</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        body{
            font-family:'Inter',sans-serif;
            padding : 0;
            margin : 0;
        }
    </style>

</head>

<body class="bg-cover bg-center min-h-screen">
    <div
        class="fixed inset-0 -z-10"
        style="
            background:
            linear-gradient(135deg,#061a2b 0%,#082338 45%,#0b2f4a 100%);
        "
    >
        <div
            class="absolute inset-0"
            style="
                background-image:
                linear-gradient(rgba(0,255,255,.08) 1px,transparent 1px),
                linear-gradient(90deg,rgba(0,255,255,.08) 1px,transparent 1px);

                background-size:75px 70px;
            "
        ></div>
    </div>

   <main>
        <!-- Navbar -->
    <header class="max-w-7xl mx-auto">
        <nav class="flex items-center justify-between">
            <!-- Logo -->
            <div class="text-white p-4">
                <h1 class="text-4xl font-bold " style="font-family:'Cormorant Garamond', serif;">Cash-Flow </h1>
            </div>
            <div class="flex items-center space-x-4 p-4">
                <div class="flex items-center space-x-2">
                    <span class="bg-green-500 text-white px-1 py-1 rounded-full animate-pulse"></span>
                    <p class="text-white text-sm" style="font-family:'Cormorant Garamond', serif;">Live</p>
                </div>
                <div class="">
                    <select name="" id="" class="bg-gray-800 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 tracking-wider" style="font-family:'Cormorant Garamond', serif;">
                         <option value="option1" >₹ INR</option>
                         <option value="option2">$ USD</option>
                    </select>
                </div>
            </div>
        </nav>
    </header>

   <!--cash-flow card-->
    <section class="max-w-7xl mx-auto mt-3">
    <div class="grid grid-cols-3 rounded-2xl border border-[#3A392F] bg-gray-900 overflow-hidden">

        <!-- Salary -->

        <div class="p-6">

            <p class="uppercase tracking-[4px] text-sm text-white">
                Total Salary
            </p>

            <h2 id="totalSalary"
                class="mt-3 text-5xl font-bold text-[#1E2D24]"
                style="font-family:'Cormorant Garamond', serif;"
            >
                ₹0.00
            </h2>

        </div>

        <!-- Expenses -->

        <div class="p-6 border-l border-dashed border-[#BDB6A3]">

            <p class="uppercase tracking-[4px] text-sm text-white">
                Total Expenses
            </p>

            <h2
                id="totalExpanses"
                class="mt-3 text-5xl font-bold text-[#A43A32]"
                style="font-family:'Cormorant Garamond', serif;"
            >
                ₹0.00
            </h2>

        </div>

        <!-- Remaining -->

        <div class="p-6 border-l border-dashed border-[#BDB6A3]">

            <p
                class="inline-block uppercase tracking-[4px] text-sm text-[#57564B] bg-[#D7D3C7] px-1"
            >
                Remaining Balance
            </p>

            <h2 id="remainBalance"
                class="mt-3 text-5xl font-bold text-[#1E5A46]"
                style="font-family:'Cormorant Garamond', serif;"
            >
                ₹0.00
            </h2>

        </div>
    </div>
    </section>

    <!--form for adding salary and expanses-->
    <section class="max-w-7xl mx-auto mt-5 px-5 py-3 bg-[#F4EEDC] border border-[#2E3428] rounded-2xl">
    <!-----salary---->
    <div>

        <div class="flex items-center gap-3 mb-3">

            <span class="text-lg font-bold text-[#B8891A]">01</span>

            <h2
                class="text-xl font-semibold text-[#1E2D24]"
                style="font-family:'Cormorant Garamond', serif;"
            >
                Set Salary
            </h2>

        </div>

        <form
            id="salaryForm"
            class="flex items-end gap-6"
        >

            <div class="flex-1">

                <label
                    for="salary"
                    class="block mb-1 text-sm tracking-[3px] uppercase text-[#5E625B]"
                >
                    Total Salary
                </label>

                <input
                    id="salary"
                    type="number"
                    placeholder="e.g. 50000"
                    class="w-full rounded-md border border-[#30352C] bg-transparent px-3 py-1 text-lg outline-none focus:ring-2 focus:ring-[#1E5A46]"
                >

            </div>

            <button
                type="submit"
                class="px-10 py-2 rounded-md bg-[#1F2C20] text-white font-medium hover:bg-[#2E4231] transition"
            >
                Save Salary
            </button>

        </form>

    </div>

    <div class="my-4 border-t border-dashed border-[#A8A08E]"></div>

    <!------- Expenses------>
    <div>
        <div class="flex items-center gap-3 mb-3">

            <span class="text-lg font-bold text-[#B8891A]">02</span>

            <h2
                class="text-xl font-semibold text-[#1E2D24]"
                style="font-family:'Cormorant Garamond', serif;"
            >
                Add Expense
            </h2>

        </div>

        <form
            id="expenseForm"
            class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end"
        >

            <div>

                <label
                    for="expenseName"
                    class="block mb-1 text-sm tracking-[3px] uppercase text-[#5E625B]"
                >
                    Expense Name
                </label>

                <input
                    id="expenseName"
                    type="text"
                    placeholder="e.g. Grocery"
                    class="w-full rounded-md border border-[#30352C] bg-transparent px-4 py-1 text-lg outline-none focus:ring-2 focus:ring-[#1E5A46]"
                >

            </div>

            <div>

                <label
                    for="expenseAmount"
                    class="block mb-1 text-sm tracking-[3px] uppercase text-[#5E625B]"
                >
                    Expense Amount
                </label>

                <input
                    id="expenseAmount"
                    type="number"
                    placeholder="e.g. 1200"
                    class="w-full rounded-md border border-[#30352C] bg-transparent px-4 py-1 text-lg outline-none focus:ring-2 focus:ring-[#1E5A46]"
                >

            </div>

            <button
                type="submit"
                class="w-full py-2 rounded-md bg-[#1F2C20] text-white font-medium hover:bg-[#2E4231] transition"
            >
                Add Expense
            </button>

        </form>

    </div>
    </section>

    <div id="expenseList" class="max-w-7xl  mx-auto mt-5 space-y-2 bg-[#F4EEDC]"></div>

    <div class="max-w-xl mx-auto mt-5">

    <canvas id="expenseChart"></canvas>

    </div>



</main>

    <script src="script.js"></script>
</body>
</html>
